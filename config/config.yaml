# =====================================================
#  SHORT COVER CASCADE — Master Control File
# =====================================================
#  Edit this file to change bot behavior.
#  Bot reads config at startup AND between every 5-min candle scan.
#  Exceptions (require bot restart):
#    - feeds.active_feed  (broker switch)
#    - mode.order_place_mode  (safety)
# =====================================================


# ---------- BROKER FEED SELECTION ----------
# Which broker the bot uses for live data and (later) orders.
# Only ONE feed is active at a time. The other doesn't touch the API.
feeds:
  active_feed: kite          # Options: kite OR upstox
  healthcheck_timeout_seconds: 10

  upstox:
    enabled: ON              # ON = available to switch to. OFF = totally disabled.
    token_validity_days: 365 # 365 = use Upstox Analytics tab long-token (no daily refresh)
                             # 1   = daily OAuth refresh required
  kite:
    enabled: ON
    token_validity_days: 1   # SEBI rule: Kite tokens expire daily for individuals.
                             # Run scripts/refresh_token_kite.py every morning.


# ---------- MODE CONTROLS (most-changed settings) ----------
# These are the master switches. Change these frequently as you progress
# through phases.
mode:
  alert_mode: ON             # ON = send Telegram alerts on valid signals
  order_place_mode: OFF      # ON = place real orders (Phase 8 only, requires restart)
  paper_trade_mode: ON       # ON = simulate orders in logs only, no real money


# ---------- INSTRUMENT SELECTION ----------
# Which underlyings the bot watches. Disable one to focus on the other.
instruments:
  nifty_enabled: ON
  banknifty_enabled: ON

  # Lot sizes — bot auto-verifies these from Kite/Upstox at 9:15 AM.
  # If broker reports a different value, bot logs a warning and uses broker value.
  nifty_lot_size: 65
  banknifty_lot_size: 30


# ---------- STRIKE SELECTION ----------
# Which strikes around ATM the bot scans on every 5-min candle close.
# ATM = nearest strike to current spot
# ITM = one strike in-the-money (deeper-value, higher delta, earlier signals)
# OTM = one strike out-of-the-money (cheaper, faster moves, original strategy default)
strike:
  max_deviation_from_atm: 2            # Hard cap — never go beyond ± 2 strike
  late_entry_threshold_percent: 30     # If option is >30% above VWAP already, skip (chasing)

  # Which strikes to SCAN and ALERT on (Phase 5+).
  # Each strike depth is an independent ON/OFF toggle. ITMn = n strikes
  # in-the-money, OTMn = n strikes out-of-the-money. Non-contiguous
  # combos are allowed (e.g. itm1 ON, itm2 OFF, itm3 ON).
  # Validator in config_loader.py requires at least one level ON.
  alert_strikes:
    itm3: OFF                          # Alert on ITM-3 strike
    itm2: ON                           # Alert on ITM-2 strike
    itm1: ON                           # Alert on ITM-1 strike
    atm:  ON                           # Alert on ATM strike
    otm1: OFF                          # Alert on OTM-1 strike
    otm2: OFF                          # Alert on OTM-2 strike
    otm3: OFF                          # Alert on OTM-3 strike

  # Which strikes to AUTO-ORDER on (Phase 8+ only)
  # Safer to start with ATM only. Add others after you trust the bot.
  order_strikes:
    itm: OFF                           # Start OFF — enable after gaining confidence
    atm: ON                            # ATM is the safest default to auto-order
    otm: OFF                           # Start OFF — enable after gaining confidence


# ---------- STOP LOSS CONTROL ----------
# How the bot computes the SL price after a valid signal.
stop_loss:
  method: 3                            # 1 = point buffer (default, from strategy doc)
                                       # 2 = percentage-based (alternative)
                                       # 3 = Method-1 initial SL then N-SMA trail (see sma_trail below)
  use_vix_multiplier: ON               # ON = multiply SL buffer by VIX regime factor
                                       # OFF = use base buffer only (riskier in high vol)
  hard_exit_red_candle_below_vwap: ON  # ON = exit immediately if full red candle below VWAP
                                       #     (overrides SL — emergency rule)
  sma_trail:                           # Only used when method: 3
    sma_period: 19                     # SMA period on the option close (default 19)
    activate_after_minutes: 15         # First N min after entry uses the Method 1 SL,
                                       # then convert to SMA trail
    update_interval_minutes: 15        # Re-evaluate the trailing SL every N min
                                       # (matches the real-broker modify cadence)
    follow_direction: both             # both    = SL follows the SMA up AND down
                                       # ratchet = SL only moves up (never loosens)


# ---------- RISK / REWARD ----------
# How much to risk per trade and where to exit profitably.
risk_reward:
  target_risk_per_trade: 3000          # Target ₹ risk per trade (sweet spot)
  risk_range_min: 2500                 # Informational lower band — NOT a skip gate. Lower realized risk is fine.
                                       # Formula naturally produces values below ₹3000 due to integer lot rounding.
  risk_range_max: 3500                 # Acceptable upper bound (cap)

  # TP multipliers (R = entry price − SL price; TP = entry + R × multiplier)
  normal_day_tp1_r: 1.5                # Non-expiry: first exit at 1.5R
  normal_day_tp2_r: 2.5                # Non-expiry: final exit at 2.5R
  expiry_day_tp1_r: 2.0                # Expiry day: first exit at 2.0R (bigger targets)
  expiry_day_tp2_r: 3.0                # Expiry day: final exit at 3.0R

  move_sl_to_breakeven_after_tp1: ON   # After TP1, move remaining SL to entry price
                                       # (Method 1/2 only; Method 3 ignores this and keeps trailing.)
  trail_sl_after_tp1: OFF              # LEGACY FLAG — informational only.
                                       # For real trailing, set stop_loss.method: 3
                                       # and configure stop_loss.sma_trail above.

  # ---------- TARGET 3 (FUTURE — not yet implemented) ----------
  # Prerequisite: Phase 8 live orders with partial-fill tracking.
  #
  # Method 3 (SMA trail): NO fixed TP3. SMA trail runs freely after TP1
  #   until SMA is crossed or 15:00 EOD. TP3 concept does not apply.
  #
  # Method 1 and Method 2 only — SL movement ladder:
  #   TP1 hit (1.5R normal / 2.0R expiry) → move SL to entry (0R breakeven)
  #   TP2 hit (2.5R normal / 3.0R expiry) → move SL to TP1 price (1.5R / 2.0R expiry)
  #   TP3 hit (5.0R normal / 6.0R expiry) → exit ALL remaining lots immediately
  #
  # Lot-exit ladder — 50/50 rule (scalable to any lot count):
  #   Formula: tp1_lots = ceil(lots / 2),  tp2_lots = lots − tp1_lots
  #   Odd lots: extra lot goes to TP1 (conservative — book more at TP1).
  #   Even lots: exactly 50/50. No TP3 leg.
  #   Special case: lots = 1 → full exit at TP1, no runner (no breakeven step).
  #
  #   Lots  TP1 lots  TP2 lots  Split
  #     1      1         0      100% at TP1 (full exit, no runner)
  #     2      1         1      50/50
  #     3      2         1      odd: extra to TP1
  #     4      2         2      50/50
  #     5      3         2      odd: extra to TP1
  #    10      5         5      50/50
  #    20     10        10      50/50
  #    30     15        15      50/50
  #
  #   Implemented in: src/risk/lot_sizing.compute_lot_split()
  #   Used by: outcome_replay.py (paper + Phase 7) and Phase 8 live orders.
  #
  #   PARTIAL R is lot-dependent: PARTIAL R = tp1_fraction × tp1_r.
  #     Even lots: 0.5 × tp1_r (= 0.75R on normal day, 1.0R on expiry).
  #     3-lot odd: (2/3) × 1.5 = 1.0R on normal day.
  #
  # Lot-exit ladder — future 3-target system (TP3 phase):
  #   Lots  TP1 leg    TP2 leg    TP3 leg    Note
  #     1   1 lot      —          —          Full exit at TP1
  #     2   1 lot      1 lot      —          No TP3 lot available
  #     3   1 lot      1 lot      1 lot      Clean thirds
  #     4   2 lots     1 lot      1 lot
  #     5   2 lots     2 lots     1 lot
  #     6   2 lots     2 lots     2 lots     Clean thirds
  #     7   3 lots     2 lots     2 lots
  #   Rule: TP1 = ceil(lots/3), TP2 = ceil((lots−TP1)/2), TP3 = remainder
  #
  # Config keys to add when implementing TP3:
  #   normal_day_tp3_r: 5.0
  #   expiry_day_tp3_r: 6.0


# ---------- POSITION SIZING ----------
# How many lots to take per trade.
position_sizing:
  lot_cap_enabled: ON                  # ON = enforce hard caps below (recommended)
  nifty_max_lots: 5                    # Hard ceiling for NIFTY
  banknifty_max_lots: 5                # Hard ceiling for BankNifty
  # If OFF: lots determined only by ₹3000 risk formula (risky for cheap premiums)


# ---------- DAILY CIRCUIT BREAKERS ----------
# Kill switches that stop trading for the day. First trigger wins.
circuit_breakers:
  daily_sl_count_breaker: ON           # ON = stop after N stop-losses
  max_sl_per_day: 3                    # Stop the day after 2 SL hits

  daily_loss_breaker: ON               # ON = stop after ₹X cumulative loss
  max_loss_per_day_rupees: 6000        # Stop the day if total loss >= ₹6000


# ---------- ORDER PLACEMENT ----------
# How the bot places orders (Phase 8 only — ignored in alert-only mode).
orders:
  order_type: limit                    # Options: limit OR market
  cancel_if_price_touches_tp1: ON      # ON = cancel unfilled limit order if price hits TP1
  fallback_to_market_if_limit_disabled: ON


# ---------- TIME RULES ----------
# All times in IST (Asia/Kolkata).
time_rules:
  normal_start_time: "09:45"           # No signals before 9:45 (opening noise)
  gap_day_start_time: "10:00"          # On gap-up/down days, wait until 10:00
  last_entry_time: "14:30"             # No new entries after 2:30 PM
  soft_squareoff_time: "14:59"         # Start closing positions at 2:59 PM
  hard_squareoff_time: "15:00"         # Hard close (cannot be disabled in code)

  # Gap-day rule — VWAP distortion on opens >threshold% from prev close
  gap_day_enabled: OFF                 # MASTER TOGGLE — default OFF.
                                       # When OFF: gap math still LOGGED for
                                       # visibility, but 9:45 start used.
                                       # When ON: gap >threshold triggers
                                       # 10:00 start on that day.
  gap_day_threshold_pct: 1.0           # % move that qualifies as gap day
                                       # 1.0 = strategy doc default
                                       # 0.75 = moderate, 0.5 = conservative
  gap_day_direction: "both"            # "both" | "up" | "down"
                                       # Symmetric default — matches strategy doc


# ---------- RE-ENTRY RULES ----------
# Conditions for re-entering after a stop-loss hit.
re_entry:
  cooldown_minutes_after_sl: 15        # Wait at least N minutes after any SL
  same_strike_kill_after_2_sl: ON      # ON = strike is dead-for-the-day after 2 SLs on it


# ---------- CONDITION THRESHOLDS ----------
# Numeric thresholds used inside C0–C4 logic.
conditions:
  c3_rsi_min: 50                       # RSI must be ABOVE this (default 50)
  c3_rsi_max: 80                       # RSI must be BELOW this (overbought guard)

  # C0 = spot-vs-VWAP direction filter.
  # OFF (default) = scan BOTH CE and PE on every selected strike each candle
  # and let C1–C4 decide. C0 result is reported as SKIPPED in logs.
  # ON  = original behavior: CE only when spot above VWAP, PE only when below.
  c0_spot_trend_filter_enabled: OFF

  # C1 late-entry filter (Phase 5.2)
  c1_max_distance_pct: 30              # Reject alerts where option >30% above own VWAP.
                                       # Default 30% per strategy doc.
                                       # Strikes 30-50% above VWAP logged as
                                       # event_type="would_alert_extended" but do NOT
                                       # fire alerts — captures data for future tuning.
  c1_extended_zone_enabled: ON         # Log "would_alert_extended" scans
  c1_extended_zone_max_pct: 50         # Upper bound for extended zone logging

  # C5 = ADX(14) trend filter — Phase 6.1 SHADOW MODE addition.
  # `enabled` controls compute + log + alert-line display.
  # `gating`  controls whether C5 BLOCKS the alert (joins the C1-C4
  #           gating set). Keep gating OFF during shadow validation;
  #           flip ON later once the data justifies it.
  # Semantics:
  #   enabled:false              -> C5 absent (not computed, not logged, not shown)
  #   enabled:true, gating:false -> shadow: computed/logged/shown but NEVER blocks
  #   enabled:true, gating:true  -> real gating: alert requires C1-C5
  c5_adx:
    enabled: ON                        # Shadow on by default — collect data
                                       # If ADX turns out useless, kill it completely: enabled: OFF  
    gating: OFF                        # OFF during shadow validation
                                       # once gating is ON, your alert only fires when C1 + C2 + C3 + C4 + C5 all pass. 
                                       # One restart, no code change, no re-litigation — exactly the pattern you've followed for every other decision in this project.
    period: 14                         # Matches RSI period
    adx_min: 20                        # 15=earliest/noisiest, 20=emerging (balanced),
                                       # 25=established trend
    require_rising: ON                 # adx > adx_prev (ignition filter)
    use_di_alignment: OFF              # If ADX strength alone is enough use_di_alignment: OFF 
                                       # If Spot DI alignment also matters: use_di_alignment: ON
                                       # C5 measures trend STRENGTH (ADX>=min + rising),
                                       # not direction. Direction is already covered by
                                       # C0 (spot vs VWAP) and C1 (option vs option VWAP).
                                       # +DI / -DI are still LOGGED every scan for Phase 7
                                       # analysis — they just don't drive the C5 ✓/❌.
    lookback_candles: 150              # Rolling multi-day window (~2 sessions).
                                       # NOT session-anchored — ADX needs stable
                                       # history at session open.


# ---------- TELEGRAM ALERTS (Phase 5) ----------
# Configure which alerts the bot sends to your Telegram chat.
telegram:
  send_signal_alerts: ON               # The main alert when 5/5 conditions pass
  send_rejection_alerts: OFF           # Verbose: also send when conditions fail (debugging)
  send_eod_summary: ON                 # End-of-day summary at 3:30 PM
  send_circuit_breaker_alerts: ON      # When daily SL count / loss cap hit
  send_startup_alert: ON               # When bot starts each morning


# ---------- LOGGING ----------
# How much detail goes into logs/.
logging:
  log_level: INFO                      # DEBUG / INFO / WARNING / ERROR
  log_every_signal_check: ON           # Log every condition evaluation (Phase 6 backtest data)
  log_indicator_values: ON             # Include VWAP/RSI/MAs in each log entry
  log_extended_zone: ON                # Phase 5.2: write "would_alert_extended" events
                                       # for option distance 30-50% above VWAP


# ---------- DASHBOARD (Phase 5.2) ----------
# Quarterly Excel + monthly Parquet ML store.
dashboard:
  auto_trigger_at_1535: ON             # Auto-sync at 15:35 IST after EOD summary
  excel_rotation: "quarterly"          # Excel files rotate per quarter
  parquet_rotation: "monthly"          # Parquet files split monthly
  send_eod_dashboard_link: OFF         # Future: Telegram link to .xlsx

  # Phase 5B-A: post-hoc virtual exit replay. Walks each 5/5 alert's
  # subsequent 5-min option candles and stamps auto_* outcome columns
  # in Parquet + Excel. Manual columns (order_status, exit_price,
  # pnl_rupees, outcome_remark, user_notes) are NEVER overwritten.
  # The kernel simulates whichever stop_loss.method (1/2/3) is active,
  # including Method 3's 19-SMA trail.
  auto_outcome_tracking: ON

  # Outcome categories user can mark in the Excel Order Place sheet
  outcome_categories:
    - TP2_HIT
    - TP1_HIT
    - SL_HIT
    - PARTIAL
    - WOULD_SKIP


# ---------- PAPER TRADING (Phase 5D) ----------
# Lite reconstruction of TP/SL outcomes for alert-only mode.
# Sits ON TOP of the alert-firing pipeline (read-only over alerts.jsonl
# + the 5B-A replay_cache). Does NOT modify scan/condition/alert logic.
# Replaced by broker callbacks when Phase 8 (live orders) lands.
paper_trading:
  enabled: ON                            # ON = run the paper layer at EOD sync.
                                         # OFF = skip everything below.

  # ----- D1: first-alert-only episode collapse -----
  # All alerts sharing the episode key whose candle timestamps fall
  # within dedup_window_minutes of the episode's first alert (OR while
  # that episode's paper position is still open) belong to the same
  # episode. Re-fires are flagged as "echo" — only the first alert
  # becomes the paper trade.
  episode_key:                           # Fields whose tuple defines an episode
    - symbol
    - option_type
  dedup_window_minutes: 20               # 20 = strategy default

  # Tie-break when multiple strikes fire on the same candle_timestamp.
  # ITM1 is preferred per the locked-in strike-selection decision.
  relation_priority:
    - ITM1
    - ATM
    - ITM2
    - ITM3
    - OTM1
    - OTM2
    - OTM3

  # Which strike relations are eligible for paper trades.
  # Mirrors `strike.alert_strikes` — every relation that fires a Telegram
  # alert should also be paper-tracked, otherwise alerts on ITM/OTM strikes
  # produce no paper row (no outcome, no P&L, no count) and the dashboard
  # silently drops them. Uses the simplified 3-way bucket: itm covers
  # ITM1/ITM2/ITM3, otm covers OTM1/OTM2/OTM3. If the episode
  # representative's relation bucket is OFF here, the selector marks
  # the trade as SKIPPED (reason: "paper_order_strike not enabled").
  # At least one bucket must be ON, else the validator refuses to load.
  paper_order_strikes:
    itm: ON                              # ON = ITM1/ITM2/ITM3 reps eligible for paper trades.
                                         # Matches strike.alert_strikes (itm1/itm2 ON) so every
                                         # ITM alert produces a paper row + outcome.
    atm: ON                              # ATM = safest default, matches order_strikes
    otm: OFF                             # OFF = OTM1/OTM2/OTM3 reps -> SKIPPED
                                         # (alert_strikes also has otm1/otm2/otm3 OFF)

  # ----- D2: selection caps (replayed in chronological order; §13/§14) -----
  max_trades_per_day: 5
  circuit_breaker_sl_count: 5            # 2-SL day-stopper (§14)
  cooldown_minutes_after_sl: 15          # §13 — usually equal to re_entry above
  same_strike_kill_after_2_sl: ON        # §13 — same strike SL'd twice = dead

  # ----- D4: persistence -----
  paper_trades_path: logs/paper_trades.jsonl
  paper_overrides_path: logs/paper_overrides.csv
  # TP1/TP2 multipliers and SL method are inherited from the
  # `risk_reward` + `stop_loss` blocks above — no paper-only knobs.
  # Full SL is -1R by definition.


# ---------- SHADOW STOP-LOSS LAB (experimental) ----------
# EXPERIMENTAL, READ-ONLY. The shadow lab lives in src/shadow_sl/ and
# walks every alert in logs/alerts.jsonl against alternative SL rules,
# writing one row per (alert x method) to logs/shadow_sl.jsonl.
# It NEVER touches paper_trades.jsonl, the monthly Parquet store, or
# the Excel dashboards. Never affects real or paper P&L. The live bot
# does NOT import this block — it is exercised only by
# scripts/update_shadow_sl.py / .bat.
shadow_sl:
  enabled: ON                            # Master toggle for the lab
  atr_period: 14                         # Wilder ATR period shared by all methods
  methods:
    sma19:
      enabled: ON                        # Baseline = live Method 3 logic + price clamp
    atr_initial:
      enabled: ON
      k: 2.0                             # SL = entry_vwap - k*ATR (no trail)
    chandelier:
      enabled: ON
      k: 3.0                             # SL = highest_high_since_entry - k*ATR
    chandelier_time:
      enabled: ON
      k: 3.0
      time_stop_minutes: 35              # Force-exit if MFE still below min_r after N min
      time_stop_min_r: 1.0               # Minimum MFE (in R) needed to keep holding


# ---------- BOT BEHAVIOR ----------
# Internal bot tuning. Usually don't change.
bot:
  scan_buffer_seconds: 20              # Wait N sec after candle close before scanning.
                                       # Kite needs ~15-20s to finalize a 5-min candle —
                                       # scanning too early reads a partial candle whose
                                       # volume is far below the final value.
  api_retry_count: 3                   # Retry broker API calls N times on failure
  api_retry_delay_seconds: 2           # Wait N seconds between retries
  vix_refresh_minutes: 30              # Re-read India VIX every N min for NEW-entry SL sizing (0 = lock at session start, legacy). Bad read (<=0) keeps last good value.
  state_persistence_enabled: ON        # ON = save daily state to logs/state.json
